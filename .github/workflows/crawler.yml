name: TokyoGas Usage Crawler

on:
  push:
    branches-ignore:
      - data
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  run-fetch-electricity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'

      - name: Install dependencies
        working-directory: backend
        run: |
          npm install
          npx puppeteer browsers install chrome

      - name: Run fetchElectricity
        working-directory: backend
        run: npx tsx fetchElectricity.ts
        env:
          TOKYOGAS_EMAIL: ${{ secrets.TOKYOGAS_EMAIL }}
          TOKYOGAS_PASSWORD: ${{ secrets.TOKYOGAS_PASSWORD }}
          CONTRACT_NUMBER: ${{ secrets.CONTRACT_NUMBER }}

      - name: Push the csv file to the repository
        if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          temp_dir="$(mktemp -d)"
          if git ls-remote --exit-code --heads origin data; then
            git fetch origin data
            git worktree add "$temp_dir" origin/data
          else
            git worktree add -b data "$temp_dir"
          fi
          mkdir -p "$temp_dir/backend/csv_store"
          cp backend/csv_store/*.csv "$temp_dir/backend/csv_store/"
          cd "$temp_dir"
          git add backend/csv_store/*.csv
          git commit -m "Update CSV files [skip ci]" || echo "No changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:data

  run-dc-notice-bot:
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    needs: run-fetch-electricity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: backend
        run: |
          pnpm install --frozen-lockfile

      - name: Run dcNoticeBot
        working-directory: backend
        run: npx tsx dcNoticeBot.ts
        env:
          DC_CHANNEL_ID: ${{ secrets.DC_CHANNEL_ID }}
          DC_TOKEN: ${{ secrets.DC_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}